<style>
:root{
--gold:#ffd700;
--dark:#050505;
--wa-green:#25d366;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:#000;
color:#fff;
font-family:Arial, sans-serif;
overflow-x:hidden;
position:relative;
}
body::before{
content:"";
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:
linear-gradient(rgba(255,215,0,0.05) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,215,0,0.05) 1px, transparent 1px);
background-size:40px 40px;
z-index:-2;
animation:gridmove 25s linear infinite;
}
@keyframes gridmove{
0%{transform:translateY(0)}
100%{transform:translateY(40px)}
}
.candle-bg{
position:absolute;
top:180px; 
left:0;
width:100%;
height:calc(100% - 180px);
pointer-events:none;
z-index:-1;
overflow:hidden;
}
.candle{
position:absolute;
bottom:0;
width:6px;
border-radius:2px;
animation:rise 3s linear infinite;
}
@keyframes rise{
0%{transform:translateY(0) scaleY(1); opacity:0.2;}
50%{opacity:0.7;}
100%{transform:translateY(-300px) scaleY(2); opacity:0;}
}
.brand-header{
width:100%;
max-width:1100px;
margin:auto;
padding:25px;
color:var(--gold);
letter-spacing:5px;
font-weight:800;
text-transform:uppercase;
border-bottom:2px solid var(--gold);
text-align:center;
}
.hero{padding:80px 20px;text-align:center;}
.profile-card{
background:rgba(10,10,10,0.9);
padding:50px;
border-radius:40px;
border:1px solid rgba(255,215,0,0.2);
max-width:650px;
margin:auto;
animation:goldGlow 4s infinite;
}
.profile-img{
width:150px;height:150px;border-radius:50%;
border:3px solid var(--gold);
margin-bottom:20px;object-fit:cover;
animation:float 5s infinite;
}
.section-title{
font-size:1.8rem;color:var(--gold);
margin:60px 0 40px;text-align:center;
}
.course-grid{
display:flex;gap:25px;flex-wrap:wrap;
justify-content:center;
}
.course-card{
background:#0a0a0a;
border:1px solid rgba(255,215,0,0.2);
padding:40px;border-radius:30px;
width:360px;
}
.yt-card{border-color:#ff0000;}
.trade-vault-card{
max-width:800px;margin:80px auto;
background:#050505;border-radius:35px;
padding:50px;text-align:center;
}
.access-btn{
border:2px solid var(--gold);
color:var(--gold);padding:18px 45px;
border-radius:50px;cursor:pointer;
}
.contact-card{
background:rgba(255,255,255,0.1);
padding:30px;width:300px;
border-radius:25px;color:#fff;
text-decoration:none;
}
footer{padding:60px;text-align:center;color:#555;}
@keyframes float{50%{transform:translateY(-15px)}}
@keyframes goldGlow{
50%{box-shadow:0 0 25px rgba(255,215,0,0.7)}
}
</style>
</head>

<body>

<div class="brand-header">THE VAULT HDE FX ACADEMY</div>

<section class="hero">
<div class="profile-card">
<img src="hamza.jpg" class="profile-img">
<h1>Hamza Fayaz</h1>
<p>Institutional ICT Architect</p>
</div>
</section>

<h2 class="section-title">Courses</h2>

<section class="course-grid">
<div class="course-card">
<h3>Algorithmic ICT</h3>
<p>$250</p>
<a href="https://wa.me/923235957001">Enroll</a>
</div>
<div class="course-card">
<h3>HDE Masterclass</h3>
<p>$499</p>
<a href="https://wa.me/923235957001">Join</a>
</div>
</section>

<footer>© 2026 THE VAULT HDE FX ACADEMY</footer>

<!-- 🔥 AI BOT -->
<style>
#ai-bot-btn{
position:fixed;bottom:20px;right:20px;
background:#ffd700;border-radius:50%;
width:65px;height:65px;font-size:26px;
}
#ai-chat{
position:fixed;bottom:100px;right:20px;
width:300px;background:#000;color:#fff;
display:none;border:1px solid gold;
}
</style>

<button id="ai-bot-btn" onclick="toggleChat()">🤖</button>

<div id="ai-chat">
<div>AI Assistant</div>
<input id="userInput">
<button onclick="sendMessage()">Send</button>
<div id="messages"></div>
</div>

<script>
function toggleChat(){
let c=document.getElementById("ai-chat");
c.style.display=c.style.display==="block"?"none":"block";
}
function sendMessage(){
let m=document.getElementById("userInput").value;
let box=document.getElementById("messages");
box.innerHTML+="<p>"+m+"</p>";

let r="Contact WhatsApp 03235957001";
if(m.includes("price")) r="$250 / $499";

box.innerHTML+="<p>"+r+"</p>";
}
</script>

</body>
</html>
