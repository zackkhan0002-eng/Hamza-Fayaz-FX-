<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamza Fayaz FX | Professional Portfolio</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 60px 20px;
        }

        /* Branding at the Top */
        .brand-header {
            position: absolute;
            top: 20px;
            left: 30px;
            font-weight: bold;
            color: #ffd700;
            letter-spacing: 3px;
            font-size: 0.9rem;
            text-transform: uppercase;
            border-left: 3px solid #ffd700;
            padding-left: 10px;
        }

        /* Profile Card - Clean Look */
        .profile-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            text-align: center;
            max-width: 450px;
            width: 100%;
            margin-bottom: 50px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px solid #ffd700;
            padding: 5px;
            object-fit: cover;
            margin-bottom: 20px;
        }

        h1 { 
            font-size: 2.2rem; 
            color: #fff; 
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255,215,0,0.3);
        }

        .premium-tag {
            color: #ffd700;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 10px;
        }

        /* Gallery Section */
        .gallery-container {
            width: 100%;
            max-width: 1100px;
            text-align: center;
        }

        .gallery-title { 
            margin-bottom: 30px; 
            font-size: 1.2rem; 
            color: #aaa; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .trading-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 10px;
        }

        .trading-gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s;
        }

        .trading-gallery img:hover {
            transform: translateY(-10px);
            border-color: #ffd700;
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.2);
        }

        footer { margin-top: auto; padding: 40px; color: #444; font-size: 0.8rem; letter-spacing: 1px; }

    </style>
</head>
<body>

    <div class="brand-header">ICT FOREX TRADER</div>

    <div class="profile-card">
        <img src="hamza.jpg" alt="Hamza Fayaz" class="profile-img">
        <h1>Hamza Fayaz FX</h1>
        <div class="premium-tag">HDE CONCEPT ANALYST</div>
    </div>

    <div class="gallery-container">
        <h2 class="gallery-title">Market Liquidity Analysis</h2>
        <div class="trading-gallery">
            <img src="trade1.jpg" alt="Analysis 1">
            <img src="trade2.jpg" alt="Analysis 2">
        </div>
    </div>

    <footer>
        &copy; 2026 HAMZA FAYAZ FX | PRIVACY PROTECTED
    </footer>

</body>
</html>
