<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamza Fayaz FX | Professional Portfolio</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            color: #fff;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            scroll-behavior: smooth;
        }

        /* Brand Header */
        .brand-header {
            width: 100%;
            padding: 20px;
            text-align: left;
            font-weight: bold;
            color: #ffd700;
            letter-spacing: 3px;
            font-size: 0.8rem;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,215,0,0.1);
        }

        /* Hero Section */
        .hero {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .profile-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            max-width: 450px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }

        .profile-img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 2px solid #ffd700;
            padding: 8px;
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .premium-tag { color: #ffd700; letter-spacing: 4px; font-size: 0.8rem; }

        /* Stats Section */
        .stats-container {
            display: flex;
            gap: 30px;
            margin: 50px 0;
            flex-wrap: wrap;
            justify-content: center;
        }

        .stat-box {
            background: rgba(255,215,0,0.05);
            padding: 20px 40px;
            border-radius: 15px;
            border-left: 3px solid #ffd700;
            text-align: center;
        }

        .stat-box h2 { color: #ffd700; font-size: 1.8rem; }
        .stat-box p { font-size: 0.8rem; color: #aaa; text-transform: uppercase; }

        /* Gallery Section */
        .section-container {
            width: 100%;
            max-width: 1100px;
            padding: 80px 0;
            text-align: center;
        }

        .section-title {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .trading-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .trading-gallery img {
            width: 100%;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.5s;
        }

        .trading-gallery img:hover { transform: scale(1.02); border-color: #ffd700; }

        /* Contact Section */
        .contact-card {
            background: #ffd700;
            color: #000;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            margin-bottom: 100px;
        }

        .contact-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 35px;
            background: #000;
            color: #ffd700;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }

        .contact-btn:hover { transform: scale(1.1); background: #222; }

        footer { padding: 40px; color: #444; font-size: 0.8rem; }

    </style>
</head>
<body>

    <div class="brand-header">ICT FOREX TRADER</div>

    <section class="hero">
        <div class="profile-card">

            <h1>Hamza Fayaz FX</h1>
            <div class="premium-tag">HDE CONCEPT ANALYST</div>
        </div>
        
        <div class="stats-container">
            <div class="stat-box"><h2>85%</h2><p>Accuracy</p></div>
            <div class="stat-box"><h2>24/7</h2><p>Market Analysis</p></div>
            <div class="stat-box"><h2>ICT</h2><p>Methodology</p></div>
        </div>
    </section>

    <section class="section-container">
        <h2 class="section-title">Market Analysis Portfolio</h2>
        <div class="trading-gallery">
            <img src="trade1.jpg" alt="Gold Analysis">
            <img src="trade2.jpg" alt="Silver Analysis">
        </div>
