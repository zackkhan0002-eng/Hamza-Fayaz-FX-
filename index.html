<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Hamza Fayaz FX | ICT Trader</title>
    <meta name="description" content="Official portfolio of Hamza Fayaz FX. Expert ICT Trader specializing in Gold and Forex.">
    <meta name="keywords" content="Hamza Fayaz FX, ICT Trader, Gold Trading, Forex Pakistan">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        /* Profile Section */
        .profile-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
            width: 100%;
            margin-bottom: 40px;
            animation: fadeIn 1.5s ease-in-out;
        }

        .profile-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
            object-fit: cover;
            margin-bottom: 15px;
        }

        h1 { font-size: 2rem; color: #ffd700; letter-spacing: 2px; text-transform: uppercase; }
        .tagline { color: #aaa; font-style: italic; margin-bottom: 10px; }

        /* Gallery Section */
        .gallery-title { margin-bottom: 20px; font-size: 1.5rem; color: #fff; border-bottom: 2px solid #ffd700; display: inline-block; padding-bottom: 5px; }
        
        .trading-gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
        }

        .trading-gallery img {
            width: 100%;
            max-width: 450px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }

        .trading-gallery img:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
        }

        /* Footer */
        footer { margin-top: auto; padding: 20px; color: #555; font-size: 0.9rem; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <img src="hamza.jpg" alt="Hamza Fayaz" class="profile-img">
        <h1>Hamza Fayaz FX</h1>
        <p class="tagline">ICT Trader | Market Analyst | HDE Concept</p>
        <p style="color: #ffd700; font-weight: bold;">"Mastering Liquidity, Delivering Precision"</p>
    </div>

    <h2 class="gallery-title">Recent Market Analysis</h2>
    <div class="trading-gallery">
        <img src="trade1.jpg" alt="Trade Analysis 1">
        <img src="trade2.jpg" alt="Trade Analysis 2">
    </div>

    <footer>
        &copy; 2026 Hamza Fayaz FX. All Rights Reserved.
    </footer>

</body>
</html>
